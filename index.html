<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREXPAL DESUT | Profesional + Simpan Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        biruTua: '#061429',
                        biruGelap: '#0c2040',
                        biruTerang: '#0099ff',
                        biruCerah: '#66ccff',
                        hijauTegas: '#00cc88',
                        merahTegas: '#ff4d4d',
                        kuningEmas: '#ffcc00',
                        putihLembut: '#e6f2ff',
                        abuLembut: '#99ccff',
                    },
                    fontFamily: {
                        inter: ['Segoe UI', 'Roboto', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-grid {
                background-image: linear-gradient(rgba(0, 150, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.05) 1px, transparent 1px);
                background-size: 28px 28px;
            }
            .bagian-hover {
                transition: all 0.25s ease;
            }
            .bagian-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 0 30px rgba(0, 153, 255, 0.3);
            }
            .item-hover {
                transition: all 0.25s ease;
            }
            .item-hover:hover {
                transform: translateX(4px);
                background-color: rgba(0, 160, 255, 0.2);
            }
            .tombol-hover {
                transition: all 0.25s ease;
            }
            .tombol-hover:hover {
                transform: translateY(-2px);
            }
        }
    </style>
</head>
<body class="font-inter min-h-screen bg-[radial-gradient(circle_at_top,_#0f274f,_#061429,_#000)] bg-grid text-putihLembut p-5">
    <div class="max-w-3xl mx-auto">
        <!-- KEPALA UTAMA -->
        <div class="relative text-center p-8 mb-10 border-2 border-biruTerang rounded-3xl bg-[rgba(8,35,75,0.75)] shadow-[0_0_35px_rgba(0,153,255,0.4)] overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-[rgba(0,153,255,0.15)] to-transparent pointer-events-none"></div>
            <div class="text-kuningEmas text-2xl font-bold mb-3 tracking-wider">🎖️ FOREXPAL DESUT</div>
            <h1 class="text-biruCerah text-4xl font-extrabold mb-4 uppercase tracking-[3px]">CEKLIS PROFESIONAL SWING TRADING</h1>
            <div class="text-abuLembut text-base font-medium" id="tanggal"></div>
            <div class="mt-3 text-hijauTegas text-sm font-semibold animate-pulse">💾 PENYIMPANAN OTOMATIS AKTIF</div>
        </div>

        <!-- 🎮 PERSIAPAN MODE GAMING & FOKUS -->
        <div class="bagian-hover p-8 mb-8 rounded-2xl border border-[rgba(0,153,255,0.3)] bg-[rgba(12,32,64,0.82)] shadow-[0_0_25px_rgba(0,153,255,0.22)]">
            <h2 class="flex items-center gap-3 text-biruCerah text-2xl font-bold mb-7 pb-3 border-b border-[rgba(0,153,255,0.25)]">
                <i class="fa fa-gamepad"></i> PERSIAPAN MODE GAMING & FOKUS
            </h2>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus1">
                <span class="text-putihLembut text-base font-medium">Istirahat cukup, tubuh segar dan bugar sepenuhnya</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus2">
                <span class="text-putihLembut text-base font-medium">Perut terisi, sudah minum air putih yang cukup</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus3">
                <span class="text-putihLembut text-base font-medium">Lingkungan tenang, bebas gangguan luar</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus4">
                <span class="text-putihLembut text-base font-medium">Pikiran jernih, tidak sedang emosi, kecewa, atau serakah</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus5">
                <span class="text-putihLembut text-base font-medium">Siap fokus penuh, disiplin mengikuti rencana</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="fokus6">
                <span class="text-putihLembut text-base font-medium">Sudah tetapkan batas kerugian harian & target keuntungan</span>
            </label>
        </div>

        <!-- 💱 INFORMASI MATA UANG -->
        <div class="bagian-hover p-8 mb-8 rounded-2xl border border-[rgba(0,153,255,0.3)] bg-[rgba(12,32,64,0.82)] shadow-[0_0_25px_rgba(0,153,255,0.22)]">
            <h2 class="flex items-center gap-3 text-biruCerah text-2xl font-bold mb-7 pb-3 border-b border-[rgba(0,153,255,0.25)]">
                <i class="fa fa-exchange"></i> INFORMASI INSTRUMEN PERDAGANGAN
            </h2>
            <select id="mataUang" class="w-full p-4 mb-5 rounded-xl border border-biruTerang bg-[rgba(8,25,60,0.92)] text-white text-base focus:outline-none focus:border-biruCerah focus:shadow-[0_0_15px_rgba(0,153,255,0.4)]">
                <option value="">-- Pilih Pasangan Mata Uang Utama --</option>
                <option value="EUR/USD">EUR/USD - Euro / Dolar Amerika Serikat</option>
                <option value="GBP/USD">GBP/USD - Pound Inggris / Dolar AS</option>
                <option value="USD/JPY">USD/JPY - Dolar AS / Yen Jepang</option>
                <option value="USD/CAD">USD/CAD - Dolar AS / Dolar Kanada</option>
                <option value="AUD/USD">AUD/USD - Dolar Australia / Dolar AS</option>
                <option value="NZD/USD">NZD/USD - Dolar Selandia Baru / Dolar AS</option>
                <option value="USD/CHF">USD/CHF - Dolar AS / Franc Swiss</option>
                <option value="EUR/GBP">EUR/GBP - Euro / Pound Inggris</option>
                <option value="EUR/JPY">EUR/JPY - Euro / Yen Jepang</option>
                <option value="GBP/JPY">GBP/JPY - Pound Inggris / Yen Jepang</option>
                <option value="XAU/USD">XAU/USD - Emas / Dolar AS</option>
                <option value="XAG/USD">XAG/USD - Perak / Dolar AS</option>
                <option value="EUR/AUD">EUR/AUD - Euro / Dolar Australia</option>
                <option value="GBP/AUD">GBP/AUD - Pound Inggris / Dolar Australia</option>
            </select>
            <input type="text" id="arahPosisi" class="w-full p-4 rounded-xl border border-biruTerang bg-[rgba(8,25,60,0.92)] text-white text-base focus:outline-none focus:border-biruCerah focus:shadow-[0_0_15px_rgba(0,153,255,0.4)]" placeholder="↗️ Arah Transaksi: BELI / JUAL">
        </div>

        <!-- 📊 ANALISIS PASAR -->
        <div class="bagian-hover p-8 mb-8 rounded-2xl border border-[rgba(0,153,255,0.3)] bg-[rgba(12,32,64,0.82)] shadow-[0_0_25px_rgba(0,153,255,0.22)]">
            <h2 class="flex items-center gap-3 text-biruCerah text-2xl font-bold mb-7 pb-3 border-b border-[rgba(0,153,255,0.25)]">
                <i class="fa fa-line-chart"></i> ANALISIS PASAR SWING LENGKAP
            </h2>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis1">
                <span class="text-putihLembut text-base font-medium">Analisis tren utama pada kerangka waktu MINGGUAN</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis2">
                <span class="text-putihLembut text-base font-medium">Konfirmasi arah tren pada kerangka waktu HARIAN</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis3">
                <span class="text-putihLembut text-base font-medium">Identifikasi titik Dukungan & Perlawanan yang Kuat & Jelas</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis4">
                <span class="text-putihLembut text-base font-medium">Evaluasi indikator teknis: RSI, MACD, MA, Bollinger Band</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis5">
                <span class="text-putihLembut text-base font-medium">Periksa kalender berita ekonomi & dampaknya</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 mb-3 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis6">
                <span class="text-putihLembut text-base font-medium">Konfirmasi pola harga: Kelanjutan atau Pembalikan</span>
            </label>
            <label class="item-hover flex items-center gap-4 p-4 rounded-xl bg-[rgba(0,130,255,0.1)] cursor-pointer">
                <input type="checkbox" class="w-6 h-6 accent-hijauTegas cursor-pointer" id="analisis7">
                <span class="text-putihLembut text-base font-medium">Tidak melawan arah tren utama pasar</span>
            </label>
        </div>

        <!-- 🎯 RENCANA MASUK & TARGET -->
        <div class="bagian-hover p-8 mb-8 rounded-2xl border border-[rgba(0,153,255,0.3)] bg-[rgba(12,32,64,0.82)] shadow-[0_0_25px_rgba(0,153,255,0.22)]">
            <h2 class="flex items-center gap-3 text-biruCerah text-2xl font-bold mb-7 pb-3 border-b border-[rgba(0,153,255,0.25)]">
                <i class="fa fa-bullseye"></i> RENCANA MASUK, TARGET & BATAS
            </h2>
            <div class="grid grid-cols-2 gap-4 mb-5">
                <input type="text" id="hargaMasuk" class="w-full p-4 rounded-xl border border-biruTerang bg-[rgba(8,25,60,0.92)] text-white text-base focus:outline-none focus:border-biruCerah focus:shadow-[0_0_15px_rgba(0,153,255,0.4)]" placeholder="📥 Harga Masuk">
                <input type="text" id="takeProfit" class="w-full p-4 rounded-xl border border-biruTerang bg-[rgba(8,25,60,0.92)] text-white text-base focus:outline-none focus:border-biruCerah focus:shadow-[0_0_15px_rgba(0,153,255,0.4)]" placeholder
